name: Fan Decor CS Agent

# Always-on cloud runtime. Runs server-side on GitHub's infra — independent of any laptop.
# GitHub cron is UTC. This window (05:00–19:00 UTC, every 30 min) safely covers 07:00–19:00
# Europe/London across BST and GMT; runtime/main.py enforces the exact London 07:00–19:00 window.
on:
  # LIVE: every 30 min, 05:00-19:00 UTC (covers 07:00-19:00 London across BST/GMT; main.py enforces
  # the exact London window). DRY_RUN defaults true (drafts only) until the repo variable is set false.
  schedule:
    - cron: "*/30 5-19 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = draft/print only, NO sends (safe test). false = allow real sends."
        type: choice
        options: ["true", "false"]
        default: "true"        # allow manual runs / testing

concurrency:
  group: cs-agent
  cancel-in-progress: false    # never overlap cycles

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r runtime/requirements.txt
      - name: Run one CS cycle
        env:
          # Scheduled runs operate for real (create drafts/tasks/pings). Safety is the autonomy MODE:
          # draft_only auto-sends NOTHING to customers. Manual dispatch defaults to dry_run=true.
          DRY_RUN:                  ${{ inputs.dry_run || vars.DRY_RUN || 'false' }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_ADMIN_TOKEN:      ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          SLACK_WEBHOOK_URL:        ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN:          ${{ secrets.SLACK_BOT_TOKEN }}
          CLICKUP_TOKEN:            ${{ secrets.CLICKUP_TOKEN }}
          TIKTOK_APP_KEY:           ${{ secrets.TIKTOK_APP_KEY }}
          TIKTOK_APP_SECRET:        ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_ACCESS_TOKEN:      ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN:     ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_SHOP_CIPHER:       ${{ secrets.TIKTOK_SHOP_CIPHER }}
          GMAIL_SERVICE_ACCOUNT_JSON: ${{ secrets.GMAIL_SERVICE_ACCOUNT_JSON }}
        # Manual "Run workflow" clicks bypass the business-hours gate (it's a deliberate test);
        # scheduled runs still respect 07:00-19:00 London.
        run: python -m runtime.main ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
